<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control Obsequios — Vista Web</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-title">CONTROL OBSEQUIOS</div>
      <div class="sidebar-sub">En proceso · solo lectura</div>

      <button class="nav-item active" data-tab="0" type="button">
        <span class="nav-icon">📋</span>
        <span class="nav-label">En proceso</span>
        <span class="nav-count" id="count-0">0</span>
      </button>
      <button class="nav-item" data-tab="1" type="button">
        <span class="nav-icon">📦</span>
        <span class="nav-label">No Enviados</span>
        <span class="nav-count" id="count-1">0</span>
      </button>
      <button class="nav-item" data-tab="2" type="button">
        <span class="nav-icon">🚚</span>
        <span class="nav-label">Enviados</span>
        <span class="nav-count" id="count-2">0</span>
      </button>
      <button class="nav-item" data-tab="3" type="button">
        <span class="nav-icon">✅</span>
        <span class="nav-label">Cerrados</span>
        <span class="nav-count" id="count-3">0</span>
      </button>
      <button class="nav-item" data-tab="4" type="button">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Estadísticas</span>
      </button>

      <button class="btn-refresh" id="btn-refresh" type="button">🔄 Actualizar datos</button>
      <button class="btn-refresh btn-export" id="btn-export" type="button">📥 Exportar Excel</button>
    </aside>

    <main class="main">
      <div class="brand">
        GRUPO RECALFRENO
        <span class="badge-web">Web · sync 5 min</span>
      </div>

      <div class="kpi-row" id="kpi-row">
        <div class="kpi-card">
          <div class="kpi-icon balon">⚽</div>
          <div>
            <div class="kpi-title">Balones enviados</div>
            <div class="kpi-value" id="kpi-balon">— / —</div>
            <div class="kpi-sub" id="kpi-balon-sub">Restante: —</div>
          </div>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon camiseta">👕</div>
          <div>
            <div class="kpi-title">Camisetas enviadas</div>
            <div class="kpi-value" id="kpi-camiseta">— / —</div>
            <div class="kpi-sub" id="kpi-camiseta-sub">Restante: —</div>
          </div>
        </div>
      </div>

      <div class="status-bar" id="status-bar">Conectando…</div>

      <div id="table-section">
        <div class="toolbar">
          <input class="search-input" id="search" type="search" placeholder="Buscar por nombre o RUC…" />
          <button class="btn-action success" id="btn-enviar" type="button" disabled>
            ENVIAR
          </button>
          <button class="btn-action primary" id="btn-confirm" type="button" disabled>
            Confirmar envío
          </button>
          <button class="btn-action danger" id="btn-delete" type="button" disabled>
            🗑 Eliminar envío
          </button>
          <button class="btn-action secondary" id="btn-revert" type="button" disabled>
            ↩ Volver a Enviados
          </button>
        </div>
        <div class="table-wrap">
          <table>
            <thead id="table-head"></thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
      </div>

      <div class="stats-panel" id="stats-panel"></div>
    </main>
  </div>

  <div class="toast" id="toast" role="status"></div>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/campos.js"></script>
  <script src="js/business.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
